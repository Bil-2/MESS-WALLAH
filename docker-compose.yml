services:
  # ─────────────────────────────────────────
  # 1. MONGODB DATABASE
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: mess-wallah-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: mess-wallah
    ports:
      - "27017:27017"      # Expose for local GUI tools (Compass, etc.)
    volumes:
      - mongo_data:/data/db   # Persist data between restarts
    networks:
      - mess-wallah-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────
  # 2. BACKEND (Node.js / Express)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mess-wallah-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      # Point to the mongo service (uses service name as hostname inside Docker network)
      MONGODB_URI: mongodb://mongo:27017/mess-wallah
      FRONTEND_URL: http://localhost:3000
      CLIENT_URL: http://localhost:3000
      # ─── Copy your secrets from backend/.env below ───
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      JWT_COOKIE_EXPIRE: ${JWT_COOKIE_EXPIRE:-7}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_PASS: ${GMAIL_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:5001/api/auth/google/callback
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      SELF_PING_ENABLED: "false"    # Disable self-ping inside Docker
    ports:
      - "5001:5001"
    volumes:
      - backend_uploads:/app/uploads   # Persist uploaded files
    networks:
      - mess-wallah-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # 3. FRONTEND (React + Vite → Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The frontend talks to the backend via the HOST machine's port
        # (browser makes requests, not container-to-container)
        VITE_API_URL: http://localhost:5001/api
    container_name: mess-wallah-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"       # Visit http://localhost:3000
    networks:
      - mess-wallah-net

# ─────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────
volumes:
  mongo_data:
    name: mess-wallah-mongo-data
  backend_uploads:
    name: mess-wallah-uploads

networks:
  mess-wallah-net:
    name: mess-wallah-network
    driver: bridge
